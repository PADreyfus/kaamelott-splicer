<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0D0A07"><title>Kaamelott Player</title><link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"></head>
<body>
<div class="hdr"><div class="hdr-t">KAAMELOTT</div><div class="hdr-d">LECTEUR ALÉATOIRE D'ÉPISODES</div></div>
<div class="tabs"><button class="tab on" data-t="player"><i>▶</i>Lecture</button><button class="tab" data-t="episodes"><i>☰</i>Épisodes</button><button class="tab" data-t="manage"><i>⚙</i>Gérer</button></div>
<div class="cnt"><div class="cnt-in">
<div class="pnl on" id="p-player"><div class="upl" id="uplArea"><div class="upl-i">🏰</div><div class="upl-t">Chargez vos compilations</div><div class="upl-d">Fichiers MP3 de compilations Kaamelott.<br>Détection rapide du jingle (~30s).</div><button class="bg" id="bLoad">CHARGER DES FICHIERS</button></div><div class="ld" id="ldArea" style="display:none"><div class="sp"></div><div class="ld-t" id="ldTxt"></div><div class="ld-s" id="ldSub"></div><div class="ld-bar"><div class="ld-fill" id="ldFill"></div></div></div><div id="plContent" style="display:none"><div class="np" id="npCard" style="display:none"><div class="np-l">EN COURS DE LECTURE</div><div class="np-t" id="npT"></div><div class="np-sub" id="npS"></div><div class="pb"><div class="pf" id="pFill"></div></div><div class="tr"><span id="tE">0:00</span><span id="tT">0:00</span></div></div><div class="ctrls"><button class="cb" id="bStop">■</button><button class="cm" id="bPlay">▶</button><button class="ca on" id="bAuto">Auto</button></div><div class="sts"><div class="st"><div class="sv" id="sA">0</div><div class="sl">Actifs</div></div><div class="st"><div class="sv" id="sR">0</div><div class="sl">Exclus</div></div><div class="st"><div class="sv" id="sC">0</div><div class="sl">Compilations</div></div></div><div id="fpArea" style="display:none"><div class="fp-box"><button class="fp-btn" id="bListenFP">🔊 Écouter jingle</button><button class="fp-btn" id="bCopyDbg">📋 Copier log</button></div></div><div id="histArea" style="display:none"><div class="sec">Historique récent</div><div id="histList"></div></div><button class="am" id="bMore">+ Charger une autre compilation</button><div class="dbg" id="dbg" style="display:none"></div></div></div>
<div class="pnl" id="p-episodes"><div class="sec" id="epCnt"></div><div id="epList"></div><div class="ey" id="epEy" style="display:none"><div class="ey-i">🗡️</div><div class="ey-t">Aucun épisode</div><div class="ey-d" id="epEyM"></div></div></div>
<div class="pnl" id="p-manage"><div class="sec" id="cpH"></div><div id="cpL"></div><div id="noCp" style="display:none;text-align:center;padding:16px;border:1px dashed var(--bdr);border-radius:8px;color:var(--tx3);font-size:13px;margin-bottom:20px">Aucune compilation</div><div id="rmSec" style="display:none;margin-top:22px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><div class="sec" id="rmH" style="margin-bottom:0"></div><button class="bo" id="bRestAll">TOUT RESTAURER</button></div><div id="rmL"></div></div><div style="text-align:center;margin-top:28px"><button class="bd" id="bReset">Tout réinitialiser</button></div></div>
</div></div>
<div class="mp" id="miniP"><div class="mpb"><div class="mpf" id="mpFill"></div></div><button class="mpn" id="mpBtn">▶</button><div class="mpi"><div class="mpt" id="mpT"></div><div class="mps" id="mpS"></div></div><button class="msh" id="mpSh">⟳</button></div>
<input type="file" id="fIn" accept="audio/*" multiple>
<script src="app.js"></script></body></html>
